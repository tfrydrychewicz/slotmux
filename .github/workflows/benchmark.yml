name: Benchmark

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    env:
      BENCH_ALERT_THRESHOLD: '1.2'
      BENCH_FAIL_ON_ALERT: 'false'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Download baseline from latest main run
        id: dl_baseline
        continue-on-error: true
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: benchmark.yml
          branch: main
          name: benchmark-baseline
          path: benchmarks/
          search_artifacts: true
          if_no_files_found: warn

      - name: Use downloaded baseline
        if: steps.dl_baseline.outcome == 'success'
        run: |
          if [ -f benchmarks/current.json ]; then
            cp benchmarks/current.json benchmarks/baseline.json
            echo "Using baseline from previous CI run"
          else
            echo "Downloaded artifact did not contain current.json, keeping committed baseline"
          fi

      - name: Vitest bench (JSON for CI)
        run: pnpm exec vitest bench --outputJson benchmarks/current.json

      - name: Compare to baseline + write PR report
        id: bench_compare
        continue-on-error: true
        run: node scripts/bench-ci-report.mjs

      - name: Report file present
        id: report
        if: always()
        run: |
          echo "exists=$([ -f benchmark-report.md ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Job summary
        if: steps.report.outputs.exists == 'true'
        run: head -n 80 benchmark-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload baseline for future runs
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-baseline
          path: benchmarks/current.json
          overwrite: true
          retention-days: 90

      - name: Upload benchmark artifacts (trend / history)
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_id }}
          path: |
            benchmarks/current.json
            benchmark-report.md
          if-no-files-found: ignore
          retention-days: 90

      - name: Sticky PR comment (benchmark table)
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          steps.report.outputs.exists == 'true'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: vitest-benchmark
          path: benchmark-report.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail on regression (when BENCH_FAIL_ON_ALERT=true)
        if: env.BENCH_FAIL_ON_ALERT == 'true' && steps.bench_compare.outcome == 'failure'
        run: |
          echo "::error::Benchmark mean exceeded ${BENCH_ALERT_THRESHOLD}× baseline for one or more tasks (see report / logs)."
          exit 1
