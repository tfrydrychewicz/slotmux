# Phase 13.2 — Supply chain (§19.1): automated update PRs
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 15
    labels:
      - dependencies
    # Bumped manually: @types/node majors misalign with engines/CI matrix; React bumps need coordinated fixes.
    ignore:
      - dependency-name: '@types/node'
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
      - dependency-name: '@types/react'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
