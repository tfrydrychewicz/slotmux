<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 120" fill="none">
  <style>text { font-family: system-ui, -apple-system, sans-serif; }</style>
  <text x="220" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#e2e2e2">compress (lossless)</text>
  <rect x="16" y="30" width="180" height="80" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="106" y="44" text-anchor="middle" font-size="8" font-weight="600" fill="#64748b">BEFORE (1,200 tokens)</text>
  <text x="26" y="62" font-size="8" fill="#cbd5e1">"Well, you know, so basically</text>
