<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" fill="none">
  <style>text { font-family: system-ui, -apple-system, sans-serif; }</style>
  <text x="240" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#e2e2e2">Lossless compression</text>
  <text x="240" y="34" text-anchor="middle" font-size="9" fill="#a3a3a3">No LLM needed -- deterministic text transformations</text>

  <rect x="16" y="48" width="200" height="100" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="116" y="62" text-anchor="middle" font-size="8" font-weight="600" fill="#64748b">BEFORE (1,200 tokens)</text>
  <text x="26" y="80" font-size="8" fill="#cbd5e1">"The user has    requested</text>
  <text x="26" y="92" font-size="8" fill="#ef4444" text-decoration="line-through">  that we   should  </text>
  <text x="26" y="104" font-size="8" fill="#cbd5e1">provide a very detailed and</text>
  <text x="26" y="116" font-size="8" fill="#ef4444" text-decoration="line-through">  quite  </text>
  <text x="72" y="116" font-size="8" fill="#cbd5e1">comprehensive</text>
  <text x="26" y="128" font-size="8" fill="#cbd5e1">overview of the system."</text>
  <text x="116" y="145" text-anchor="middle" font-size="7" fill="#ef4444">stop words + extra whitespace</text>

  <text x="240" y="102" text-anchor="middle" font-size="16" fill="#64748b">&#x2192;</text>

  <rect x="264" y="48" width="200" height="100" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="1"/>
  <text x="364" y="62" text-anchor="middle" font-size="8" font-weight="600" fill="#22c55e">AFTER (860 tokens, ~28%)</text>
  <text x="274" y="80" font-size="8" fill="#dcfce7">"User requested provide</text>
  <text x="274" y="92" font-size="8" fill="#dcfce7">detailed comprehensive</text>
  <text x="274" y="104" font-size="8" fill="#dcfce7">overview system."</text>
  <text x="364" y="128" text-anchor="middle" font-size="8" fill="#64748b">Meaning preserved</text>
  <text x="364" y="140" text-anchor="middle" font-size="8" fill="#64748b">No LLM call required</text>
</svg>
