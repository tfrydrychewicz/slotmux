<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" fill="none">
  <style>text { font-family: system-ui, -apple-system, sans-serif; }</style>
  <text x="260" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#e2e2e2">fallback-chain</text>
  <rect x="16" y="35" width="110" height="50" rx="6" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="1"/>
  <text x="71" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#fbbf24">summarize</text>
  <text x="71" y="72" text-anchor="middle" font-size="8" fill="#a3a3a3">try first</text>
  <text x="144" y="62" text-anchor="middle" font-size="14" fill="#64748b">&#x2192;</text>
  <rect x="160" y="35" width="110" height="50" rx="6" fill="#22c55e" opacity="0.2" stroke="#22c55e" stroke-width="1"/>
  <text x="215" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#86efac">compress</text>
  <text x="215" y="72" text-anchor="middle" font-size="8" fill="#a3a3a3">if summarize fails</text>
  <text x="288" y="62" text-anchor="middle" font-size="14" fill="#64748b">&#x2192;</text>
  <rect x="304" y="35" width="110" height="50" rx="6" fill="#a855f7" opacity="0.2" stroke="#a855f7" stroke-width="1"/>
  <text x="359" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#c084fc">truncate</text>
  <text x="359" y="72" text-anchor="middle" font-size="8" fill="#a3a3a3">last resort</text>
  <text x="432" y="62" text-anchor="middle" font-size="14" fill="#64748b">&#x2192;</text>
  <rect x="448" y="35" width="60" height="50" rx="6" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
  <text x="478" y="58" text-anchor="middle" font-size="10" font-weight="600" fill="#f87171">error</text>
  <text x="478" y="72" text-anchor="middle" font-size="8" fill="#a3a3a3">if all fail</text>
</svg>
