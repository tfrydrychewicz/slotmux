<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" fill="none">
  <defs>
    <marker id="arrowGray" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#a3a3a3"/></marker>
  </defs>
  <style>text { font-family: system-ui, -apple-system, sans-serif; }</style>
  <text x="260" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#e2e2e2">Incremental summarization</text>
  <text x="260" y="34" text-anchor="middle" font-size="9" fill="#a3a3a3">Only fresh items are sent to the LLM &#x2014; stable summaries are reused</text>

  <rect x="15" y="48" width="240" height="164" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="135" y="64" text-anchor="middle" font-size="9" font-weight="600" fill="#e2e2e2">Build N (first overflow)</text>

  <rect x="25" y="74" width="105" height="70" rx="4" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1"/>
  <text x="77" y="88" text-anchor="middle" font-size="7.5" font-weight="600" fill="#f87171">Raw messages</text>
  <rect x="32" y="94" width="90" height="10" rx="2" fill="#ef4444" opacity="0.15"/><text x="77" y="102" text-anchor="middle" font-size="6.5" fill="#f87171">msg 1 (800 tok)</text>
  <rect x="32" y="107" width="90" height="10" rx="2" fill="#ef4444" opacity="0.15"/><text x="77" y="115" text-anchor="middle" font-size="6.5" fill="#f87171">msg 2 (600 tok)</text>
  <rect x="32" y="120" width="90" height="10" rx="2" fill="#ef4444" opacity="0.15"/><text x="77" y="128" text-anchor="middle" font-size="6.5" fill="#f87171">msg 3 (500 tok)</text>

  <rect x="25" y="150" width="105" height="24" rx="4" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1"/>
  <text x="77" y="166" text-anchor="middle" font-size="7.5" font-weight="600" fill="#a78bfa">&#x2192; 3 LLM calls</text>

  <rect x="140" y="74" width="105" height="70" rx="4" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1"/>
  <text x="192" y="88" text-anchor="middle" font-size="7.5" font-weight="600" fill="#22c55e">Recent (kept)</text>
  <rect x="147" y="94" width="90" height="10" rx="2" fill="#22c55e" opacity="0.15"/><text x="192" y="102" text-anchor="middle" font-size="6.5" fill="#22c55e">msg 4</text>
  <rect x="147" y="107" width="90" height="10" rx="2" fill="#22c55e" opacity="0.15"/><text x="192" y="115" text-anchor="middle" font-size="6.5" fill="#22c55e">msg 5</text>
  <rect x="147" y="120" width="90" height="10" rx="2" fill="#22c55e" opacity="0.15"/><text x="192" y="128" text-anchor="middle" font-size="6.5" fill="#22c55e">msg 6</text>

  <text x="135" y="196" text-anchor="middle" font-size="7" fill="#94a3b8">Output: 3 summaries + 3 recent</text>

  <path d="M255,130 L265,130" stroke="#a3a3a3" stroke-width="1.5" marker-end="url(#arrowGray)"/>

  <rect x="265" y="48" width="240" height="164" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="385" y="64" text-anchor="middle" font-size="9" font-weight="600" fill="#e2e2e2">Build N+1 (incremental)</text>

  <rect x="275" y="74" width="105" height="50" rx="4" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1"/>
  <text x="327" y="88" text-anchor="middle" font-size="7.5" font-weight="600" fill="#60a5fa">Stable summaries</text>
  <rect x="282" y="94" width="90" height="10" rx="2" fill="#3b82f6" opacity="0.15"/><text x="327" y="102" text-anchor="middle" font-size="6.5" fill="#60a5fa">sum 1 (reused)</text>
  <rect x="282" y="107" width="90" height="10" rx="2" fill="#3b82f6" opacity="0.15"/><text x="327" y="115" text-anchor="middle" font-size="6.5" fill="#60a5fa">sum 2 (reused)</text>

  <rect x="275" y="128" width="105" height="30" rx="4" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1"/>
  <text x="327" y="142" text-anchor="middle" font-size="7.5" font-weight="600" fill="#f87171">Fresh: msg 7</text>
  <text x="327" y="152" text-anchor="middle" font-size="6.5" fill="#f87171">new content only</text>

  <rect x="275" y="164" width="105" height="24" rx="4" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1"/>
  <text x="327" y="180" text-anchor="middle" font-size="7.5" font-weight="600" fill="#a78bfa">&#x2192; 1 LLM call</text>

  <rect x="390" y="74" width="105" height="70" rx="4" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1"/>
  <text x="442" y="88" text-anchor="middle" font-size="7.5" font-weight="600" fill="#22c55e">Recent (kept)</text>
  <rect x="397" y="94" width="90" height="10" rx="2" fill="#22c55e" opacity="0.15"/><text x="442" y="102" text-anchor="middle" font-size="6.5" fill="#22c55e">msg 8</text>
  <rect x="397" y="107" width="90" height="10" rx="2" fill="#22c55e" opacity="0.15"/><text x="442" y="115" text-anchor="middle" font-size="6.5" fill="#22c55e">msg 9</text>
  <rect x="397" y="120" width="90" height="10" rx="2" fill="#22c55e" opacity="0.15"/><text x="442" y="128" text-anchor="middle" font-size="6.5" fill="#22c55e">msg 10</text>

  <text x="385" y="196" text-anchor="middle" font-size="7" fill="#94a3b8">Output: 2 reused + 1 new + 3 recent</text>

  <text x="135" y="212" text-anchor="middle" font-size="8" font-weight="600" fill="#f87171">Cost: O(all items)</text>
  <text x="385" y="212" text-anchor="middle" font-size="8" font-weight="600" fill="#22c55e">Cost: O(new items)</text>
</svg>
