<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" fill="none">
  <defs>
    <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#6b7280"/></marker>
    <marker id="arrowheadOrange" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#f59e0b"/></marker>
    <marker id="arrowheadRed" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto"><path d="M0,0 L6,2 L0,4" fill="#ef4444"/></marker>
  </defs>
  <style>text { font-family: system-ui, -apple-system, sans-serif; }</style>
  <text x="260" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#e2e2e2">Fact-aware compression</text>
  <text x="260" y="34" text-anchor="middle" font-size="9" fill="#a3a3a3">Structured facts survive aggressive narrative compression</text>

  <rect x="20" y="48" width="200" height="120" rx="6" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <text x="120" y="64" text-anchor="middle" font-size="8" font-weight="600" fill="#a78bfa">LLM output</text>
  <text x="30" y="80" font-size="7.5" fill="#c4b5fd">FACT: user | playlist | Summer Vibes</text>
  <text x="30" y="92" font-size="7.5" fill="#c4b5fd">FACT: user | camera | Sony FE 24-70</text>
  <text x="30" y="104" font-size="7.5" fill="#c4b5fd">FACT: user | city | San Francisco</text>
  <line x1="30" y1="112" x2="210" y2="112" stroke="#444" stroke-width="0.5" stroke-dasharray="3 2"/>
  <text x="30" y="124" font-size="7.5" fill="#94a3b8">The user discussed music streaming</text>
  <text x="30" y="136" font-size="7.5" fill="#94a3b8">and photography equipment...</text>
  <text x="120" y="158" text-anchor="middle" font-size="7" fill="#6b7280">extraction-first prompt</text>

  <line x1="220" y1="108" x2="240" y2="108" stroke="#6b7280" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="240" y="76" width="100" height="64" rx="6" fill="#1a1a2e" stroke="#8b5cf6" stroke-width="1"/>
  <text x="290" y="96" text-anchor="middle" font-size="8" font-weight="600" fill="#a78bfa">parseFactLines</text>
  <line x1="250" y1="104" x2="330" y2="104" stroke="#444" stroke-width="0.5"/>
  <text x="290" y="116" text-anchor="middle" font-size="7" fill="#94a3b8">Split facts from</text>
  <text x="290" y="128" text-anchor="middle" font-size="7" fill="#94a3b8">narrative text</text>

  <line x1="290" y1="140" x2="290" y2="168" stroke="#6b7280" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="340" y1="108" x2="360" y2="108" stroke="#6b7280" stroke-width="1" marker-end="url(#arrowhead)"/>

  <rect x="360" y="82" width="140" height="52" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="1"/>
  <text x="430" y="100" text-anchor="middle" font-size="8" font-weight="600" fill="#22c55e">Summary item</text>
  <text x="430" y="114" text-anchor="middle" font-size="7" fill="#94a3b8">Narrative text only</text>
  <text x="430" y="126" text-anchor="middle" font-size="7" fill="#94a3b8">(facts removed)</text>

  <rect x="200" y="172" width="180" height="78" rx="6" fill="#1a1a2e" stroke="#f59e0b" stroke-width="1"/>
  <text x="290" y="190" text-anchor="middle" font-size="8" font-weight="600" fill="#fbbf24">FactStore</text>
  <text x="290" y="204" text-anchor="middle" font-size="7" fill="#94a3b8">Deduplicates by subject|predicate</text>
  <text x="290" y="216" text-anchor="middle" font-size="7" fill="#94a3b8">Keeps highest confidence</text>
  <text x="290" y="230" text-anchor="middle" font-size="7" fill="#94a3b8">Survives across compression rounds</text>
  <text x="290" y="244" text-anchor="middle" font-size="7" fill="#fbbf24">Renders &#x2192; "Known facts: ..."</text>

  <line x1="380" y1="210" x2="410" y2="175" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrowheadOrange)"/>
  <text x="430" y="168" text-anchor="middle" font-size="7" fill="#f59e0b">pinned into context</text>

  <line x1="200" y1="210" x2="60" y2="210" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2"/>
  <line x1="60" y1="210" x2="60" y2="232" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 2" marker-end="url(#arrowheadRed)"/>
  <text x="60" y="248" text-anchor="middle" font-size="7" fill="#ef4444">fact pinning in L3</text>
  <text x="60" y="258" text-anchor="middle" font-size="6.5" fill="#6b7280">"MUST preserve these facts"</text>
</svg>
